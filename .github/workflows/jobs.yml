name: "Release"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request_target:
    types: [labeled]
    branches:
      - main
      - mirror-registry-*
  # Allows us to run release manually from the Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (tag name)'
        required: true

permissions:
  contents: read

concurrency:
  group: limit-to-one

jobs:
  pull-images:
    name: "Pull Images"
    runs-on: ubuntu-latest
    if: github.repository_owner == 'quay' && (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ok-to-test') || github.event.inputs.version)
    outputs:
      quay-image: ${{ steps.images.outputs.quay }}
      redis-image: ${{ steps.images.outputs.redis }}
      ee-image: ${{ steps.images.outputs.ee }}
      ee-base-image: ${{ steps.images.outputs.ee_base }}
      ee-builder-image: ${{ steps.images.outputs.ee_builder }}
      pause-image: ${{ steps.images.outputs.pause }}
      sqlite-image: ${{ steps.images.outputs.sqlite }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: "!github.event.inputs.version"
        with:
          persist-credentials: false

      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event.inputs.version
        with:
          ref: refs/tags/${{ github.event.inputs.version }}
          persist-credentials: false

      - name: Log into docker for registry.redhat.io
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Resolve and pull images
        id: images
        run: |
          get_env() { grep "^$1=" .env | head -1 | cut -d= -f2-; }
          # Pull images used as Dockerfile FROM stages (from .env)
          for var in QUAY_IMAGE REDIS_IMAGE EE_BASE_IMAGE EE_BUILDER_IMAGE PAUSE_IMAGE; do
            ref=$(get_env "$var")
            echo "Pulling $var=$ref"
            docker pull "$ref"
          done
          # Pull hardcoded Dockerfile FROM base images
          docker pull registry.redhat.io/ubi8:latest
          docker pull registry.access.redhat.com/ubi8:latest
          docker pull registry.access.redhat.com/ubi8-minimal:latest
          echo "quay=$(get_env QUAY_IMAGE)" >> "$GITHUB_OUTPUT"
          echo "redis=$(get_env REDIS_IMAGE)" >> "$GITHUB_OUTPUT"
          echo "ee=$(get_env EE_IMAGE)" >> "$GITHUB_OUTPUT"
          echo "ee_base=$(get_env EE_BASE_IMAGE)" >> "$GITHUB_OUTPUT"
          echo "ee_builder=$(get_env EE_BUILDER_IMAGE)" >> "$GITHUB_OUTPUT"
          echo "pause=$(get_env PAUSE_IMAGE)" >> "$GITHUB_OUTPUT"
          echo "sqlite=$(get_env SQLITE_IMAGE)" >> "$GITHUB_OUTPUT"

      - name: Save images to tar
        run: |
          get_env() { grep "^$1=" .env | head -1 | cut -d= -f2-; }
          docker save \
            $(get_env QUAY_IMAGE) \
            $(get_env REDIS_IMAGE) \
            $(get_env EE_BASE_IMAGE) \
            $(get_env EE_BUILDER_IMAGE) \
            $(get_env PAUSE_IMAGE) \
            registry.redhat.io/ubi8:latest \
            registry.access.redhat.com/ubi8:latest \
            registry.access.redhat.com/ubi8-minimal:latest \
            -o ci-images.tar

      - name: Upload images
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-images
          path: ci-images.tar
          retention-days: 1

  build-install-zip:
    name: "Build Installer"
    needs: [pull-images]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'quay' && (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ok-to-test') || github.event.inputs.version)
    strategy:
      matrix:
        installer-type: ["online", "offline"]
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: contains(github.event.pull_request.labels.*.name, 'ok-to-test')
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'push'
        with:
          persist-credentials: false

      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event.inputs.version
        with:
          ref: refs/tags/${{ github.event.inputs.version }}
          persist-credentials: false

      - name: Set version from tag/branch
        run: |
          echo "RELEASE_VERSION=$GITHUB_REF_NAME" >>"$GITHUB_ENV"
        if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ok-to-test')

      - name: Set version from input
        run: |
          echo "RELEASE_VERSION=$INPUT_VERSION" >>"$GITHUB_ENV"
        if: github.event.inputs.version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Download images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ci-images

      - name: Load images
        run: docker load -i ci-images.tar

      - name: Build tarfile
        run: |
          INSTALLER_TYPE="${{ matrix.installer-type }}"
          if [ "$INSTALLER_TYPE" = "offline" ]; then
            DOCKERFILE="Dockerfile"
          else
            DOCKERFILE="Dockerfile.online"
          fi

          CONTAINER_NAME="mirror-registry-${INSTALLER_TYPE}-${RELEASE_VERSION}"
          IMAGE_NAME="mirror-registry-${INSTALLER_TYPE}:${RELEASE_VERSION}"

          docker build \
            -t "$IMAGE_NAME" \
            --build-arg "RELEASE_VERSION=${RELEASE_VERSION}" \
            --build-arg "QUAY_IMAGE=${{ needs.pull-images.outputs.quay-image }}" \
            --build-arg "EE_IMAGE=${{ needs.pull-images.outputs.ee-image }}" \
            --build-arg "EE_BASE_IMAGE=${{ needs.pull-images.outputs.ee-base-image }}" \
            --build-arg "EE_BUILDER_IMAGE=${{ needs.pull-images.outputs.ee-builder-image }}" \
            --build-arg "REDIS_IMAGE=${{ needs.pull-images.outputs.redis-image }}" \
            --build-arg "PAUSE_IMAGE=${{ needs.pull-images.outputs.pause-image }}" \
            --build-arg "SQLITE_IMAGE=${{ needs.pull-images.outputs.sqlite-image }}" \
            --file "$DOCKERFILE" .

          docker run --name "$CONTAINER_NAME" "$IMAGE_NAME"
          docker cp "$CONTAINER_NAME":/mirror-registry.tar.gz .
          docker rm "$CONTAINER_NAME"

      - name: Upload tarfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mirror-registry-${{ matrix.installer-type }}-installer
          path: mirror-registry.tar.gz
          retention-days: 1

  test-remote-install:
    # Uses two VMs: a control VM runs the mirror-registry binary and a target VM
    # receives the deployment, matching the real-world remote install topology
    # where an operator machine deploys to a separate target host.
    name: "Remote Install"
    needs: ["build-install-zip", "pull-images"]
    runs-on: ubuntu-latest
    environment: ci-testing
    timeout-minutes: 90
    if: github.repository_owner == 'quay' && contains(github.event.pull_request.labels.*.name, 'ok-to-test') # Skip on release
    strategy:
      fail-fast: false
      matrix:
        installer-type: ["online", "offline"]
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install oc
        uses: redhat-actions/oc-installer@35b60c3f9757ae4301521556e1b75ff6f59f8d7c # v1
        with:
          oc_version: "4.6"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@ed3a0531877aca392eb870f440d9ae7aba83a6bd # v1
        with:
          # terraform_version: 0.13.0:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Generate ephemeral SSH key pair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_rsa -N "" -C "ci-run-${{ github.run_id }}"
          echo "TF_VAR_SSH_PUBLIC_KEY=$(cat ~/.ssh/id_rsa.pub)" >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          cp ~/.ssh/id_rsa ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          cat >>~/.ssh/config <<END
          Host quay
            HostName quay
            User ci-user
            IdentityFile ~/.ssh/staging.key
            StrictHostKeyChecking no
          Host control
            HostName control
            User ci-user
            IdentityFile ~/.ssh/staging.key
            StrictHostKeyChecking no
          END

      - name: Initialize VMs
        uses: ./.github/actions/setup-terraform
        with:
          terraform-context: ".github/workflows/remote-${{ matrix.installer-type }}-installer"

      - name: Add control hostname to /etc/hosts
        run: |
          CONTROL_IP=$(terraform output --raw control_ip)
          echo "${CONTROL_IP}  control" | sudo tee -a /etc/hosts
        working-directory: ".github/workflows/remote-${{ matrix.installer-type }}-installer"

      - name: Wait for VMs
        run: sleep 60

      - name: Download tarfile
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirror-registry-${{ matrix.installer-type }}-installer

      - name: Add quay to /etc/hosts on target VM
        run: ssh ci-user@quay 'echo "127.0.0.1 quay" | sudo tee -a /etc/hosts'

      - name: Install podman on target VM
        run: ssh ci-user@quay 'sudo subscription-manager refresh; sudo yum -y install podman'

      - name: Pre-pull registry.redhat.io images on target VM
        run: |
          ssh ci-user@quay "podman login -u \"$REGISTRY_USER\" -p \"$REGISTRY_PASS\" registry.redhat.io && \
            podman pull \"$QUAY_IMG\" && \
            podman pull \"$REDIS_IMG\" && \
            podman logout registry.redhat.io"
        if: matrix.installer-type == 'online'
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASSWORD }}
          QUAY_IMG: ${{ needs.pull-images.outputs.quay-image }}
          REDIS_IMG: ${{ needs.pull-images.outputs.redis-image }}

      - name: Install podman on control VM
        run: ssh ci-user@control 'sudo subscription-manager refresh; sudo yum -y install podman'

      - name: Add target hostname to control VM /etc/hosts
        run: |
          TARGET_IP=$(terraform output --raw ip)
          ssh ci-user@control "echo '${TARGET_IP} quay' | sudo tee -a /etc/hosts"
        working-directory: ".github/workflows/remote-${{ matrix.installer-type }}-installer"

      - name: SCP tarball to control VM
        run: scp mirror-registry.tar.gz ci-user@control:~/

      - name: SCP SSH key to control VM
        run: |
          scp /home/runner/.ssh/id_rsa ci-user@control:~/.ssh/id_rsa
          ssh ci-user@control 'chmod 600 ~/.ssh/id_rsa'

      - name: Extract tarfile on control VM
        run: ssh ci-user@control 'tar -xf mirror-registry.tar.gz'

      - name: Install Registry
        run: ssh ci-user@control './mirror-registry install -u ci-user -r /home/ci-user/quay-install -H quay -v --initPassword password -k ~/.ssh/id_rsa'

      - name: Verify health endpoint
        run: |
          ssh ci-user@quay 'curl -sk https://quay:8443/health/instance | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          services = data.get(\"data\", {}).get(\"services\", {})
          assert services, \"No services in health response\"
          for svc, status in services.items():
              assert status, f\"Service {svc} is not healthy\"
          print(\"PASS: All services healthy\")
          "'

      - name: Mirror Images
        uses: ./.github/actions/mirror
        with:
          quay-hostname: "quay:8443"
          pull-secret: ${{ secrets.PULL_SECRET }}

      - name: Upgrade Registry
        run: ssh ci-user@control './mirror-registry upgrade -u ci-user -r /home/ci-user/quay-install -H quay -v -k ~/.ssh/id_rsa'

      - name: Test remote upgrade with SSL cert rotation
        run: |
          ssh ci-user@control 'openssl req -x509 -newkey rsa:2048 -keyout /tmp/new-ssl.key \
            -out /tmp/new-ssl.cert -days 365 -nodes -subj "/CN=quay" \
            -addext "subjectAltName=DNS:quay"'
          ssh ci-user@control './mirror-registry upgrade -u ci-user -r /home/ci-user/quay-install -H quay \
            --sslCert /tmp/new-ssl.cert --sslKey /tmp/new-ssl.key -v -k ~/.ssh/id_rsa'
          ssh ci-user@quay 'curl -sk https://quay:8443/health/instance | grep -q "\"status_code\":200"'

      - name: Test remote upgrade fails when only --sslCert is provided
        run: |
          if ssh ci-user@control './mirror-registry upgrade -u ci-user -r /home/ci-user/quay-install -H quay --sslCert /tmp/new-ssl.cert -v -k ~/.ssh/id_rsa' 2>&1; then
            echo "FAIL: upgrade should have failed with only --sslCert"
            exit 1
          fi
          echo "PASS: upgrade correctly rejected partial SSL flag input"

      - name: Uninstall Registry
        run: ssh ci-user@control './mirror-registry uninstall -u ci-user -H quay --autoApprove -v -k ~/.ssh/id_rsa'

      - name: Verify uninstall completeness
        run: |
          ssh ci-user@quay 'bash -e -c "
            test -z \"\$(podman ps -q -f name=quay 2>/dev/null)\" || { echo FAIL: quay containers still running; exit 1; }
            ! systemctl --user is-enabled quay-app.service 2>/dev/null || { echo FAIL: quay-app still enabled; exit 1; }
            ! systemctl --user is-enabled quay-pod.service 2>/dev/null || { echo FAIL: quay-pod still enabled; exit 1; }
            test ! -d ~/quay-install || { echo FAIL: quay-install dir still exists; exit 1; }
            echo PASS: uninstall cleanup verified
          "'

      - name: Download old mirror-registry tarball
        run: wget -O mirror-registry-postgres.tar.gz "https://github.com/quay/mirror-registry/releases/download/v1.3.10/mirror-registry-offline.tar.gz"

      - name: SCP old tarball to control VM
        run: scp mirror-registry-postgres.tar.gz ci-user@control:~/

      - name: Extract old tarball on control VM
        run: ssh ci-user@control 'mkdir -p ./mirror-registry-postgres && tar -xzf mirror-registry-postgres.tar.gz -C ./mirror-registry-postgres'

      - name: Install postgres backed quay registry
        run: ssh ci-user@control './mirror-registry-postgres/mirror-registry install -u ci-user -r /home/ci-user/quay-install -H quay -v --initPassword password -k ~/.ssh/id_rsa'

      # --- Verify registry works (trusted podman commands on runner) ---

      - name: Podman login to quay registry
        run: podman login -u init -p password quay:8443 --tls-verify=false

      - name: Pull busybox image from Docker Hub
        run: podman pull docker.io/library/busybox

      - name: Tag busybox image for Quay
        run: podman tag docker.io/library/busybox quay:8443/init/busybox:latest

      - name: Push busybox image to Quay
        run: podman push quay:8443/init/busybox:latest --tls-verify=false

      - name: Upgrade to test postgres to sqlite migration
        run: ssh ci-user@control './mirror-registry upgrade -u ci-user -r /home/ci-user/quay-install -H quay -v -k ~/.ssh/id_rsa'

      - name: Pull already pushed busybox image from quay registry
        run: podman pull quay:8443/init/busybox:latest --tls-verify=false

      - name: Verify busybox image is pulled successfully
        run: podman images | grep -q quay:8443/init/busybox

      - name: Uninstall Registry
        run: ssh ci-user@control './mirror-registry uninstall -u ci-user -H quay --autoApprove -v -k ~/.ssh/id_rsa'

      - name: Terraform Destroy
        run: terraform destroy --auto-approve
        shell: bash
        working-directory: ".github/workflows/remote-${{ matrix.installer-type }}-installer"
        if: always()

  test-local-install:
    name: "Local Install"
    needs: ["build-install-zip", "pull-images"]
    runs-on: ubuntu-latest
    environment: ci-testing
    timeout-minutes: 90
    if: github.repository_owner == 'quay' && contains(github.event.pull_request.labels.*.name, 'ok-to-test') # Skip on release
    strategy:
      fail-fast: false
      matrix:
        installer-type: ["online", "offline"]
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install oc
        uses: redhat-actions/oc-installer@35b60c3f9757ae4301521556e1b75ff6f59f8d7c # v1
        with:
          oc_version: "4.6"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@ed3a0531877aca392eb870f440d9ae7aba83a6bd # v1
        with:
          # terraform_version: 0.13.0:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Generate ephemeral SSH key pair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_rsa -N "" -C "ci-run-${{ github.run_id }}"
          echo "TF_VAR_SSH_PUBLIC_KEY=$(cat ~/.ssh/id_rsa.pub)" >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          cp ~/.ssh/id_rsa ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          cat >>~/.ssh/config <<END
          Host quay
            HostName quay
            User ci-user
            IdentityFile ~/.ssh/staging.key
            StrictHostKeyChecking no
          END

      - name: Initialize VM
        uses: ./.github/actions/setup-terraform
        with:
          terraform-context: ".github/workflows/local-${{ matrix.installer-type }}-installer"

      - name: Wait for VM
        run: sleep 60

      - name: Download tarfile
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirror-registry-${{ matrix.installer-type }}-installer

      - name: SCP tarball to VM
        run: scp mirror-registry.tar.gz ci-user@quay:~/mirror-registry.tar.gz

      - name: Add quay to /etc/hosts
        run: ssh ci-user@quay 'echo "127.0.0.1 quay" | sudo tee -a /etc/hosts'

      - name: Install podman
        run: ssh ci-user@quay 'sudo subscription-manager refresh; sudo yum -y install podman'

      - name: Pre-pull registry.redhat.io images on target VM
        run: |
          ssh ci-user@quay "podman login -u \"$REGISTRY_USER\" -p \"$REGISTRY_PASS\" registry.redhat.io && \
            podman pull \"$QUAY_IMG\" && \
            podman pull \"$REDIS_IMG\" && \
            podman logout registry.redhat.io"
        if: matrix.installer-type == 'online'
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASSWORD }}
          QUAY_IMG: ${{ needs.pull-images.outputs.quay-image }}
          REDIS_IMG: ${{ needs.pull-images.outputs.redis-image }}

      - name: Pull busybox image from Docker Hub before disabling traffic
        run: ssh ci-user@quay 'podman pull docker.io/library/busybox'

      - name: Disable outbound network traffic
        run: ssh ci-user@quay 'sudo firewall-cmd --direct --add-rule ipv4 filter OUTPUT 0 -m state --state ESTABLISHED,RELATED -j ACCEPT; sudo firewall-cmd --direct --add-rule ipv4 filter OUTPUT 1 -p tcp -m tcp --dport=22 -j ACCEPT; sudo firewall-cmd --direct --add-rule ipv4 filter OUTPUT 1 -p tcp -m tcp --dport=8443 -j ACCEPT; sudo firewall-cmd --direct --add-rule ipv4 filter OUTPUT 2 -j DROP'
        if: matrix.installer-type == 'offline'

      - name: Install Registry
        run: ssh ci-user@quay 'tar -xf mirror-registry.tar.gz; ./mirror-registry install -v --quayHostname quay:8443 --initPassword password'

      - name: Verify health endpoint
        run: |
          ssh ci-user@quay 'curl -sk https://quay:8443/health/instance | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          services = data.get(\"data\", {}).get(\"services\", {})
          assert services, \"No services in health response\"
          for svc, status in services.items():
              assert status, f\"Service {svc} is not healthy\"
          print(\"PASS: All services healthy\")
          "'

      - name: Mirror Images
        uses: ./.github/actions/mirror
        with:
          quay-hostname: "quay:8443"
          pull-secret: ${{ secrets.PULL_SECRET }}

      - name: Upgrade Quay
        run: ssh ci-user@quay './mirror-registry upgrade -v'

      - name: Test upgrade with SSL cert rotation
        run: |
          ssh ci-user@quay 'openssl req -x509 -newkey rsa:2048 -keyout /tmp/new-ssl.key \
            -out /tmp/new-ssl.cert -days 365 -nodes -subj "/CN=quay" \
            -addext "subjectAltName=DNS:quay"'
          ssh ci-user@quay './mirror-registry upgrade --sslCert /tmp/new-ssl.cert --sslKey /tmp/new-ssl.key --quayHostname quay:8443 -v'
          ssh ci-user@quay 'curl -sk https://quay:8443/health/instance | grep -q "\"status_code\":200"'

      - name: Test upgrade fails when only --sslCert is provided
        run: |
          if ssh ci-user@quay './mirror-registry upgrade --sslCert /tmp/new-ssl.cert -v' 2>&1; then
            echo "FAIL: upgrade should have failed with only --sslCert"
            exit 1
          fi
          echo "PASS: upgrade correctly rejected partial SSL flag input"

      - name: Uninstall Quay
        run: ssh ci-user@quay './mirror-registry uninstall --autoApprove -v'

      - name: Verify uninstall completeness
        run: |
          ssh ci-user@quay 'bash -e -c "
            test -z \"\$(podman ps -q -f name=quay 2>/dev/null)\" || { echo FAIL: quay containers still running; exit 1; }
            ! systemctl --user is-enabled quay-app.service 2>/dev/null || { echo FAIL: quay-app still enabled; exit 1; }
            ! systemctl --user is-enabled quay-pod.service 2>/dev/null || { echo FAIL: quay-pod still enabled; exit 1; }
            test ! -d ~/quay-install || { echo FAIL: quay-install dir still exists; exit 1; }
            echo PASS: uninstall cleanup verified
          "'

      - name: Download old mirror-registry tarball that runs quay with postgres
        run: wget -O mirror-registry-postgres.tar.gz "https://github.com/quay/mirror-registry/releases/download/v1.3.10/mirror-registry-offline.tar.gz"

      - name: SCP old tarball to VM
        run: scp mirror-registry-postgres.tar.gz ci-user@quay:~/mirror-registry-postgres.tar.gz

      - name: Create extraction directory for old mirror-registry binary
        run: ssh ci-user@quay 'mkdir -p ./mirror-registry-postgres'

      - name: Extract tarball into the folder
        run: ssh ci-user@quay 'tar -xzf mirror-registry-postgres.tar.gz -C ./mirror-registry-postgres'

      - name: Install postgres backed quay registry
        run: ssh ci-user@quay './mirror-registry-postgres/mirror-registry install -u ci-user -r /home/ci-user/quay-install --quayHostname quay:8443 -v --initPassword password'

      - name: Podman login to quay registry
        run: ssh ci-user@quay 'podman login -u init -p password quay:8443 --tls-verify=false'

      - name: Tag busybox image for Quay
        run: ssh ci-user@quay 'podman tag docker.io/library/busybox quay:8443/init/busybox:latest'

      - name: Push busybox image to Quay
        run: ssh ci-user@quay 'podman push quay:8443/init/busybox:latest --tls-verify=false'

      - name: Use latest binary to test upgrade cmd to ensure db migration from old postgres to sqlite
        run: ssh ci-user@quay './mirror-registry upgrade -u ci-user -r /home/ci-user/quay-install --quayHostname quay:8443 -v'

      - name: Pull already pushed busybox image from quay registry
        run: ssh ci-user@quay 'podman pull quay:8443/init/busybox:latest --tls-verify=false'

      - name: Verify busybox image was pulled successfully
        run: ssh ci-user@quay 'podman images | grep -q quay:8443/init/busybox'

      - name: Uninstall Quay
        run: ssh ci-user@quay './mirror-registry uninstall --autoApprove -v'

      - name: Install with custom credentials
        run: ssh ci-user@quay './mirror-registry install -v --quayHostname quay:8443 --initUser myadmin --initPassword "MyStr0ngP4ss"'

      - name: Verify custom credentials login
        run: ssh ci-user@quay 'podman login -u myadmin -p "MyStr0ngP4ss" quay:8443 --tls-verify=false'

      - name: Verify default credentials rejected
        run: |
          if ssh ci-user@quay 'podman login -u init -p password quay:8443 --tls-verify=false' 2>/dev/null; then
            echo "FAIL: default credentials should not work"
            exit 1
          fi
          echo "PASS: default credentials correctly rejected"

      - name: Uninstall after custom credentials test
        run: ssh ci-user@quay './mirror-registry uninstall --autoApprove -v'

      - name: Terraform Destroy
        run: terraform destroy --auto-approve
        shell: bash
        working-directory: ".github/workflows/local-${{ matrix.installer-type }}-installer"
        if: always()

  publish-release:
    name: "Publish Release"
    needs: ["build-install-zip"]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository_owner == 'quay' && (github.event_name == 'push' || github.event.inputs.version)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download offline tarfile
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirror-registry-offline-installer
      - name: Rename offline tarfile
        run: mv mirror-registry.tar.gz mirror-registry-offline.tar.gz

      - name: Download online tarfile
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirror-registry-online-installer

      - name: Rename online tarfile
        run: mv mirror-registry.tar.gz mirror-registry-online.tar.gz

      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          artifacts: "*.tar.gz,README.md"
          allowUpdates: true
          prerelease: true
          tag: ${{ github.ref_name }}
        if: github.event_name == 'push'

      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          artifacts: "*.tar.gz,README.md"
          allowUpdates: true
          prerelease: true
