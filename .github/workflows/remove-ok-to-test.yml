name: "Remove ok-to-test label on new commits"

on:
  pull_request_target:
    types: [synchronize]
    branches:
      - main
      - mirror-registry-*

permissions:
  pull-requests: write

jobs:
  remove-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'ok-to-test'
              });
              core.info('Removed ok-to-test label — maintainer must re-review before re-labeling.');
            } catch (e) {
              if (e.status === 404) {
                core.info('ok-to-test label was not present, nothing to remove.');
              } else {
                throw e;
              }
            }
