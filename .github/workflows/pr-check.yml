name: "PR Check"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - mirror-registry-*

permissions:
  contents: read
  id-token: write

jobs:
  go-validate:
    name: "Go Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.9

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          flags: unit-tests
          files: coverage.out
          fail_ci_if_error: false
